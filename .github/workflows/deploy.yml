name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

# GITHUB_TOKEN permissions required to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate og-image.png from SVG
        run: |
          sudo apt-get install -y --no-install-recommends librsvg2-bin
          rsvg-convert -w 1200 -h 630 assets/og-image.svg -o assets/og-image.png

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy only the files needed for the live site.
          # docs/ contains internal audit notes and is intentionally excluded.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
